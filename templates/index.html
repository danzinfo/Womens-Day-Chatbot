<!DOCTYPE html>
<html>
<head>
    <title>Women's Day Chatbot</title>
    
	<style>
        body { font-family: Arial; background:#f5f5f5; }
        .chatbox { width:600px; margin:auto; margin-top:50px; background:white; padding:20px; border-radius:10px; }
        #messages { height:300px; overflow-y:scroll; border:1px solid #ddd; padding:10px; margin-bottom:10px;}
        input { width:80%; padding:10px;}
        button { padding:10px;}
    </style>
	
	<!--<link rel="stylesheet" href="/static/style.css">-->
</head>
<body>
    <div class="chatbox">
        <h2>Women's Day Quote Chatbot</h2>
        <div id="messages"></div>
        <input id="message" placeholder="Ask for short, poetic, motivational quote..."/>
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
    async function sendMessage(){
        let input = document.getElementById("message");
        let msg = input.value;

        document.getElementById("messages").innerHTML += "<b>You:</b> " + msg + "<br>";

        const response = await fetch("http://localhost:8000/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({message:msg})
        });

        const data = await response.json();

        document.getElementById("messages").innerHTML += "<b>Agent:</b> " + data.response + "<br><br>";

        input.value="";
    }
    </script>
</body>
</html>
